<!DOCTYPE html>
<html>

<head>
    <title>Сотрудники</title>
    <meta charset='UTF-8'>
</head>

<body>
    <h1> Список сотрудников</h1>
    
    <form method = 'get' action = '/employees'>
        <input type = 'text' name = 'search' placeholder = "Поиск по фамилии и имени">
        <button type = 'submit'>Найти</button>
    </form>

    <table border='1'>
        <tr>
            <th><a href = "/employees?sort=id&order={{ 'desc' if current_sort == 'id' and current_order == 'asc' else 'asc' }}">ID</a></th>
            <th><a href = "/employees?sort=full_name&order={{ 'desc' if current_sort == 'full_name' and current_order == 'asc' else 'asc' }}">Фамилия имя</a></th>
            <th><a href = "/employees?sort=position&order={{ 'desc' if current_sort == 'position' and current_order == 'asc' else 'asc' }}">Должность</a></th>
            <th><a href = "/employees?sort=hire_date&order={{ 'desc' if current_sort == 'hire_date' and current_order == 'asc' else 'asc' }}">Дата найма</a></th>
            <th><a href = "/employees?sort=salary&order={{ 'desc' if current_sort == 'salary' and current_order == 'asc' else 'asc' }}">Зарплата</a></th>
            <th><a href = "/employees?sort=manager_id&order={{ 'desc' if current_sort == 'manager_id' and current_order == 'asc' else 'asc' }}">ID Начальника</a></th>
            <th>Смена начальника</th>
        </tr>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.id }}</td>
            <td>{{ emp.full_name }}</td>
            <td>{{ emp.position }}</td>
            <td>{{ emp.hire_date }}</td>
            <td>{{ emp.salary }}</td>
            <td>{{ emp.manager_id }}</td>
            <td> <form method="POST" action="/update_manager">
                <input type = 'hidden' name = 'emp_id' value = '{{ emp.id }}'>
                <input type = 'number' name = 'new_manager_id' placeholder = 'Новый ID начальника'>

                <button type = 'submit'>Сменить</button>
            </form>
        </td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
